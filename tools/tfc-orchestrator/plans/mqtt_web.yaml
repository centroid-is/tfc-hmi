name: mqtt-web
project_dir: /Users/jonb/Projects/tfc-hmi
model: opus
max_turns: 200
allowed_tools: "Bash,Read,Edit,Write,Glob,Grep,Agent,Skill"

execution_mode: dag  # 'dag' (v3 parallel) or 'phase' (v2.1 sequential fallback)

workers:
  max_parallel: 4
  worktree_isolation: true

verification:
  golden_tests: true
  marionette: true
  ai_design_review: true
  reference_html: "image_inference_live_dashboard.html"
  ui_stories: [6, 7, 8, 9, 10, 11]
  route_map:
    7: ["/", "/advanced/preferences"]
    10: ["/"]
    11: ["*"]

retry:
  max_attempts: 3
  circuit_breaker: true

review:
  enabled: true
  max_iterations: 3
  reviewers:
    - role: flutter_architect
      focus: "code quality, architecture, patterns, SOLID, widget composition"
    - role: test_engineer
      focus: "test completeness, coverage, edge cases, error handling, TDD adherence"

gsd:
  enabled: true
  discuss: true
  plan: true
  verify: true

phases:
  - name: "MQTT Core (Stories 1-3)"
    validate:
      - "cd packages/tfc_dart && dart run build_runner build --delete-conflicting-outputs"
      - "cd packages/tfc_dart && dart analyze --fatal-infos"
      - "cd packages/tfc_dart && dart test --exclude-tags=integration"
    stories:
      - id: 1
        name: "MqttConfig and MqttNodeConfig models"
      - id: 2
        name: "MqttDeviceClientAdapter implementation"
        depends_on: [1]
      - id: 3
        name: "StateMan MQTT integration + provider wiring"
        depends_on: [2]

  - name: "Config + Integration Tests (Stories 4-5)"
    validate:
      - "cd packages/tfc_dart && dart analyze --fatal-infos"
      - "cd packages/tfc_dart && dart test --exclude-tags=integration"
    stories:
      - id: 4
        name: "Mosquitto Dart test helpers + integration tests"
        depends_on: [2]
      - id: 5
        name: "Static config loading — fromString + ConfigSource"
        depends_on: [1]
      # Stories 4 and 5 have no inter-dependency → run in parallel

  - name: "Web Platform (Stories 6-7)"
    validate:
      - "cd packages/tfc_dart && dart analyze --fatal-infos"
      - "cd packages/tfc_dart && dart test --exclude-tags=integration"
      - "cd centroid-hmi && flutter build web"
    stories:
      - id: 6
        name: "Web conditional imports + compilation"
        depends_on: [5]
        timeout: 5400  # 90 min — large story, many stubs to create
      - id: 7
        name: "Provider integration — static config + page hiding"
        depends_on: [5, 6]

  - name: "Widgets + Dashboard (Stories 8-10)"
    validate:
      - "cd packages/tfc_dart && dart run build_runner build --delete-conflicting-outputs"
      - "cd packages/tfc_dart && dart analyze --fatal-infos"
      - "cd packages/tfc_dart && dart test --exclude-tags=integration"
    stories:
      - id: 8
        name: "ImageFeedConfig asset"
        depends_on: [3]
      - id: 9
        name: "InferenceLogConfig asset"
        depends_on: [3]
      # Stories 8 and 9 have no inter-dependency → run in parallel
      - id: 10
        name: "Inference dashboard page-editor.json + keymappings"
        depends_on: [8, 9]

  - name: "E2E Tests (Story 11)"
    validate:
      - "cd centroid-hmi && flutter build web"
      - "cd centroid-hmi && ./test/e2e/run-e2e.sh"
    stories:
      - id: 11
        name: "Playwright E2E tests with stubbed MQTT data"
        depends_on: [7, 10]

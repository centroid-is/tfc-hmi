        prompt: |
          You are building a web dashboard for the tfc-orchestrator (tools/tfc-orchestrator/).

          ## Context
          The orchestrator runs multi-story DAG-based builds. During execution it writes:
          - State: `.orchestrator/{plan_name}.state.json` (JSON, atomic writes after each story)
          - Logs: `.orchestrator/logs/{plan_name}/story_{id}.{stdout,stderr}.log`

          Read these files to understand the data model:
          - tools/tfc-orchestrator/orchestrator/state.py (OrchestratorState, StoryResult)
          - tools/tfc-orchestrator/orchestrator/models.py (Plan, Phase, Story)
          - tools/tfc-orchestrator/orchestrator/dag.py (DAGScheduler, NodeStatus)

          ## Task: Create Python backend

          ### 1. Add aiohttp dependency
          Edit `tools/tfc-orchestrator/pyproject.toml` — add `"aiohttp>=3.9"` to the dependencies list.

          ### 2. Create `tools/tfc-orchestrator/orchestrator/dashboard.py` (~200 lines)

          Pure functions (no aiohttp needed):
          - `read_state(state_path: Path) -> dict` — reads state JSON, returns `{"results": []}` if missing
          - `build_dag_info(plan: Plan) -> dict` — returns `{"nodes": [...], "edges": [[from, to], ...]}` from plan
          - `derive_node_statuses(plan: Plan, state_data: dict, log_dir: Path) -> dict[int, str]` — maps to "pending"/"running"/"passed"/"failed"/"skipped". Running = has no result but log file mtime < 120s ago. Skipped = dependency failed (use DAGScheduler logic).

          aiohttp app:
          - `create_app(plan_path: str, state_dir: str | None = None, poll_interval: float = 2.0) -> web.Application`
          - Routes:
            - GET `/` → serve `index.html` from `dashboard/dist/` (static files)
            - GET `/assets/{path}` → serve built Svelte assets
            - GET `/api/state` → JSON with `{plan, dag, state, statuses}`
            - GET `/api/events` → SSE stream polling state file every `poll_interval` seconds. Use `web.StreamResponse` with `text/event-stream`. Send keepalive comment every 15s. Detect changes via result count + last timestamp.
            - GET `/api/logs/{story_id}/{stream}` → last N lines of log file (query `?lines=200`). 404 if missing.
            - GET `/api/logs/{story_id}/{stream}/tail` → SSE stream tailing log file (poll every 1s, track byte offset)
          - `run_dashboard(plan_path, host='127.0.0.1', port=8080)` — entry point

          The static file serving should look for `dashboard/dist/` relative to the dashboard.py file location:
          ```python
          _DIST_DIR = Path(__file__).parent.parent / 'dashboard' / 'dist'
          ```

          ### 3. Add CLI subcommand
          Edit `tools/tfc-orchestrator/orchestrator/cli.py`:
          - Add `'dashboard'` to the `choices` list (line ~407)
          - Add `--host` (default `127.0.0.1`) and `--port` (default `8080`) arguments
          - Add handler: `elif args.command == 'dashboard': from .dashboard import run_dashboard; run_dashboard(args.plan, host=args.host, port=args.port)`

          ### 4. Create tests: `tools/tfc-orchestrator/tests/test_dashboard.py`

          Follow TDD. Test the pure functions and route handlers:

          Pure function tests (no aiohttp needed):
          - test_read_state_file_not_found_returns_empty
          - test_read_state_valid_file
          - test_build_dag_from_plan (verify nodes and edges)
          - test_derive_statuses_all_pending
          - test_derive_statuses_with_completed
          - test_derive_statuses_with_failed_cascade

          Route tests using `aiohttp.test_utils.TestClient` and `aiohttp.test_utils.TestServer`:
          - test_api_state_returns_json
          - test_api_state_includes_dag
          - test_api_logs_returns_content
          - test_api_logs_missing_returns_404
          - test_events_stream_content_type

          Use `tempfile.TemporaryDirectory` for state/log files. Create minimal plan YAML inline.

          ### 5. Validate

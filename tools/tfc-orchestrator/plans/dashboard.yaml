          ## Data shape from `/api/state`
          ```json
          {
            "plan": {"name": "mqtt-web", "execution_mode": "dag", "max_parallel": 4, "model": "opus", "total_stories": 11},
            "dag": {
              "nodes": [{"id": 1, "name": "Story name", "depends_on": [], "phase": "Phase name"}],
              "edges": [[1, 2], [2, 3]]
            },
            "state": {"started_at": "2026-03-17T08:33:01", "results": [...]},
            "statuses": {"1": "passed", "2": "running", "3": "pending"}
          }
          ```

          ## Task: Create 5 components + update App.svelte

          ### 1. `src/lib/Header.svelte`
          - Plan name (large)
          - Status badge: "Running" (blue pulse), "Complete" (green), "Failed" (red)
          - Elapsed time: live counter from `state.started_at` (update every second with setInterval)
          - Summary counters: passed/failed/skipped/pending/running (derived from statuses)
          - Layout: horizontal flexbox, items centered

          ### 2. `src/lib/WorkerSlots.svelte`
          - Show `plan.max_parallel` worker slots as boxes
          - Active slots show story ID + name (running stories from statuses)
          - Idle slots show "idle" in gray
          - Color: blue for active, dark gray for idle

          ### 3. `src/lib/DagGraph.svelte`
          - SVG-based DAG visualization
          - Layout: topological layers (left to right). Assign each node to layer = 1 + max(layer of dependencies). Space nodes vertically within each layer.
          - Nodes: rounded rectangles, 120x40px, with story ID + short name
          - Node colors by status: passed=#4caf50, failed=#f44336, running=#2196f3 (with CSS pulse animation), skipped=#ff9800, pending=#555
          - Edges: SVG paths with arrowheads between nodes
          - Clickable nodes: set selectedStory store on click
          - SVG should be responsive (viewBox based)

          ### 4. `src/lib/StoryTable.svelte`
          - Table with columns: ID, Name, Status, Duration, Retries, Review, Verify
          - Rows from dag.nodes, data from state.results
          - Status cells color-coded (same colors as DAG)
          - Duration: format as "Xm Ys" for completed stories, live counter for running
          - Clickable rows: set selectedStory store on click
          - Highlight selected row

          ### 5. `src/lib/LogViewer.svelte`
          - Only visible when selectedStory is set
          - Header bar: "Story N: Name" + close button (clears selectedStory)
          - Two tabs: stdout / stderr
          - Content area: monospace, dark background, auto-scroll to bottom
          - On mount (when story selected): fetch `/api/logs/{id}/stdout` for initial content
          - Then connect to `/api/logs/{id}/stdout/tail` SSE for live updates
          - On tab switch: disconnect old SSE, fetch + connect new stream
          - On close: disconnect SSE

          ### 6. Update `src/App.svelte`
          Replace the placeholder content with the actual components:
          ```svelte
          <script>
            import { onMount, onDestroy } from 'svelte';
            import { connectSSE, disconnectSSE } from './lib/sse.js';
            import { dashboardData } from './lib/stores.js';
            import Header from './lib/Header.svelte';
            import WorkerSlots from './lib/WorkerSlots.svelte';
            import DagGraph from './lib/DagGraph.svelte';
            import StoryTable from './lib/StoryTable.svelte';
            import LogViewer from './lib/LogViewer.svelte';

            onMount(() => connectSSE());
            onDestroy(() => disconnectSSE());
          </script>

          <main>
            {#if $dashboardData}
              <Header />
              <WorkerSlots />
              <div class="content">
                <DagGraph />
                <StoryTable />
              </div>
              <LogViewer />
            {:else}
              <div class="loading">Connecting to orchestrator...</div>
            {/if}
          </main>
          ```


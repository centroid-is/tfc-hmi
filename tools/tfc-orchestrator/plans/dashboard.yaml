          cd tools/tfc-orchestrator
          /Users/jonb/Projects/tfc-hmi/tools/tfc-orchestrator/.venv/bin/python -m pip install -e .
          /Users/jonb/Projects/tfc-hmi/tools/tfc-orchestrator/.venv/bin/python -m pytest tests/test_dashboard.py -v

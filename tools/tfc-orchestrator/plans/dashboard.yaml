      - id: 2
        name: "Svelte scaffold + SSE stores"
        acceptance_checks:
          - "cd tools/tfc-orchestrator/dashboard && npm run build"
        prompt: |
          You are building a Svelte frontend for the tfc-orchestrator web dashboard.

          ## Task: Create Svelte project scaffold at `tools/tfc-orchestrator/dashboard/`

          ### 1. Initialize project
          ```bash
          cd tools/tfc-orchestrator
          npm create vite@latest dashboard -- --template svelte
          cd dashboard
          npm install
          ```

          ### 2. Configure Vite (`vite.config.js`)
          - Set base to `./` for relative asset paths
          - Proxy `/api` to `http://127.0.0.1:8080` for dev mode:
          ```js
          import { defineConfig } from 'vite'
          import { svelte } from '@sveltejs/vite-plugin-svelte'

          export default defineConfig({
            plugins: [svelte()],
            base: './',
            server: {
              proxy: {
                '/api': 'http://127.0.0.1:8080'
              }
            }
          })
          ```

          ### 3. Create `src/lib/stores.js`
          Svelte stores for dashboard state:
          ```js
          import { writable, derived } from 'svelte/store';

          export const dashboardData = writable(null);  // full /api/state response
          export const selectedStory = writable(null);   // story ID for log viewer

          export const stories = derived(dashboardData, $d => {
            if (!$d) return [];
            return $d.dag?.nodes || [];
          });

          export const statuses = derived(dashboardData, $d => {
            if (!$d) return {};
            return $d.statuses || {};
          });

          export const planInfo = derived(dashboardData, $d => {
            if (!$d) return null;
            return $d.plan || null;
          });
          ```

          ### 4. Create `src/lib/sse.js`
          SSE connection manager:
          ```js
          import { dashboardData } from './stores.js';

          let eventSource = null;

          export function connectSSE() {
            // Initial fetch
            fetch('/api/state')
              .then(r => r.json())
              .then(data => dashboardData.set(data));

            // SSE stream
            eventSource = new EventSource('/api/events');
            eventSource.onmessage = (event) => {
              const data = JSON.parse(event.data);
              dashboardData.update(current => ({
                ...current,
                ...data,
              }));
            };
            eventSource.onerror = () => {
              // Auto-reconnect is built into EventSource
              console.warn('SSE connection lost, reconnecting...');
            };
          }

          export function disconnectSSE() {
            if (eventSource) eventSource.close();
          }
          ```

          ### 5. Create `src/App.svelte`
          Main layout shell (components will be added in Story 3):
          ```svelte
          <script>
            import { onMount, onDestroy } from 'svelte';
            import { connectSSE, disconnectSSE } from './lib/sse.js';
            import { dashboardData, planInfo } from './lib/stores.js';

            onMount(() => connectSSE());
            onDestroy(() => disconnectSSE());
          </script>

          <main>
            {#if $dashboardData}
              <h1>tfc-orchestrator: {$planInfo?.name || 'loading...'}</h1>
              <p>Connected — waiting for components...</p>
              <pre>{JSON.stringify($dashboardData?.statuses, null, 2)}</pre>
            {:else}
              <p>Connecting to orchestrator...</p>
            {/if}
          </main>

          <style>
            :global(body) {
              margin: 0;
              padding: 0;
              background: #1a1a2e;
              color: #e0e0e0;
              font-family: 'SF Mono', 'Fira Code', monospace;
            }
            main {
              max-width: 1400px;
              margin: 0 auto;
              padding: 1rem;
            }
          </style>
          ```

          ### 6. Update `src/main.js`
          ```js
          import App from './App.svelte'

          const app = new App({
            target: document.getElementById('app'),
          })

          export default app
          ```

          ### 7. Build and verify
          ```bash
          cd tools/tfc-orchestrator/dashboard
          npm run build
          ls dist/  # Should have index.html + assets/
          ```

          The build output in `dist/` will be served by the Python backend.


          ## Context — Read these files first
          - `tools/tfc-orchestrator/orchestrator/dashboard.py` — current backend (single-plan)
          - `tools/tfc-orchestrator/orchestrator/cli.py` — CLI entry point (see `dashboard` command ~line 477)

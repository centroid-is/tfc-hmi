            onMount(async () => {
              await fetchPlans();
              unsub = activePlan.subscribe(plan => {
                if (plan) connectPlan(plan);
              });
              pollInterval = setInterval(fetchPlans, 5000);
            });

            onDestroy(() => {
              disconnect();
              if (pollInterval) clearInterval(pollInterval);
              if (unsub) unsub();
            });
          </script>
          ```


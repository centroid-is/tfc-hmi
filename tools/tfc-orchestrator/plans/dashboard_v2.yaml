            passed: '#4caf50',
            failed: '#f44336',
            running: '#2196f3',
            skipped: '#ff9800',
            pending: '#555',
            interrupted: '#9e9e9e',
          };
          ```

          ## WorkerSlots fixes

          The backend now sends `max_parallel` in the plan info. Rewrite the component:

          ```svelte

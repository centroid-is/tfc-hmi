          ## Bug 1: `build_dag_info` missing `depends_on`

          The frontend DAG graph renders all nodes in ONE vertical column because nodes
          don't include their dependency info. Fix:

          ```python
          def build_dag_info(plan: Plan) -> dict:
              nodes = []
              edges = []
              for phase in plan.phases:
                  for story in phase.stories:
                      nodes.append({
                          'id': story.id,
                          'name': story.name,
                          'phase': phase.name,
                          'depends_on': list(story.depends_on),  # <-- ADD THIS
                      })
                      for dep in story.depends_on:
                          edges.append([dep, story.id])
              return {'nodes': nodes, 'edges': edges}
          ```

          ## Bug 2: SSE events send raw state, not computed data

          The `/api/events` SSE handler sends only raw `state_data`. The frontend needs
          recomputed `statuses` too (same as `/api/state`). Fix the event loop body:

          ```python
          state_data = read_state(state_path)
          dag_info = build_dag_info(plan)
          statuses = derive_node_statuses(plan, state_data, log_dir)
          payload = json.dumps({
              'state': state_data,
              'statuses': {str(k): v for k, v in statuses.items()},
              'dag': dag_info,
          })
          ```

          ## Bug 3: Log tail sends JSON-encoded text

          In `_handle_log_tail`, the data is JSON-encoded (`json.dumps(new_data)`) then the
          frontend does `logContent += event.data`. But `event.data` has escaped newlines
          like `"line1\\nline2"`. Fix by sending raw text lines as separate SSE events:

          ```python
          if size > offset:
              with open(log_file) as f:
                  f.seek(offset)
                  new_data = f.read()
              offset = size
              # Send each line as a separate SSE event (no JSON wrapping)
              for line in new_data.splitlines():
                  await resp.write(f'data: {line}\n\n'.encode())
          ```

          ## Bug 4: Log tail crashes on client disconnect

          `_handle_log_tail` catches `ConnectionResetError` but aiohttp raises
          `aiohttp.client_exceptions.ClientConnectionResetError` which is NOT a subclass
          of `ConnectionResetError`. This causes repeated tracebacks when browsers close
          the SSE connection. Fix the except clause:

          ```python
          from aiohttp.client_exceptions import ClientConnectionResetError as AiohttpConnReset

          # In _handle_log_tail:
          except (ConnectionResetError, ConnectionAbortedError, asyncio.CancelledError,
                  OSError, AiohttpConnReset, Exception):
              pass
          ```

          Do the same for `_handle_events` to be safe.

          ## Bug 5: Log 404 for running stories

          When a story just started, its log file may not exist yet. Return empty 200
          instead of 404 for missing log files when the story is running:

          ```python
          async def _handle_logs(request):
              ...
              if not log_file.exists():
                  return web.Response(text='', content_type='text/plain')
          ```

          For the tail endpoint, if the file doesn't exist, wait for it (poll every 1s
          for up to 30s, then give up):

          ```python
          async def _handle_log_tail(request):
              ...
              # Wait for log file to appear
              for _ in range(30):
                  if log_file.exists():
                      break
                  await asyncio.sleep(1)
              if not log_file.exists():
                  return web.Response(text='', content_type='text/plain')
              ...
          ```

          ## Bug 5: Missing `max_parallel` and `total_stories` in plan info


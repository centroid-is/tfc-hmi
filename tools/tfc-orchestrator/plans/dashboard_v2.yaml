      - id: 7
        name: "Fix StoryTable + WorkerSlots"
        depends_on: [3]
        acceptance_checks:
          - "cd tools/tfc-orchestrator/dashboard && npm run build"
        prompt: |
          You are fixing the StoryTable and WorkerSlots components.

          ## Context — Read these files
          - `tools/tfc-orchestrator/dashboard/src/lib/StoryTable.svelte`
          - `tools/tfc-orchestrator/dashboard/src/lib/WorkerSlots.svelte`
          - `tools/tfc-orchestrator/dashboard/src/lib/stores.js`

          ## StoryTable fixes

          ### Fix 1: Duration not updating (Svelte reactivity bug)

          The `now` variable updates via setInterval but isn't referenced in the template
          expression, so Svelte doesn't re-render. Pass it explicitly:

          ```svelte
          <td class="mono">{formatDuration(result, status, now)}</td>
          ```

          Update the function signature: `function formatDuration(result, status, _now)`.

          ### Fix 2: Completed duration shows "--"

          The state data has `duration_seconds` (float) but the code tries to compute from
          `started_at`/`finished_at`. `finished_at` doesn't exist. `started_at` is often
          empty string for early stories. Fix:

          ```js
          function formatDuration(result, status, _now) {
            if (!result) return status === 'running' ? '...' : '--';

            // Completed: use duration_seconds
            if (result.duration_seconds && result.duration_seconds > 0) {
              const secs = Math.floor(result.duration_seconds);
              const m = Math.floor(secs / 60);
              const s = secs % 60;
              return m > 0 ? `${m}m ${s}s` : `${s}s`;
            }

            // Running: compute from started_at
            if (result.started_at && status === 'running') {
              const startMs = new Date(result.started_at).getTime();
              const secs = Math.floor((_now - startMs) / 1000);
              if (secs < 0) return '...';
              const m = Math.floor(secs / 60);
              const s = secs % 60;
              return m > 0 ? `${m}m ${s}s` : `${s}s`;
            }

            return '--';
          }
          ```

          ### Fix 3: Wrong field names for Retries/Review/Verify

          The state result object uses these fields (check the state JSON):
          - `retry_count` (not `retries`)
          - `review_iterations` (not `review`)
          - `verification_passed` (boolean or null, not `verify`)

          Update the table cells:
          ```svelte
          <td class="mono">{result?.retry_count ?? '--'}</td>
          <td class="mono">{result?.review_iterations ?? '--'}</td>
          <td class="mono">
            {#if result?.verification_passed === true}
              <span style="color: #4caf50">✓</span>
            {:else if result?.verification_passed === false}
              <span style="color: #f44336">✗</span>
            {:else}
              --
            {/if}
          </td>
          ```

          ### Fix 4: Add "interrupted" status color

          ```js

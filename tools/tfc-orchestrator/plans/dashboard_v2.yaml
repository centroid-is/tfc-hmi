        prompt: |
          You are adding live progress streaming to the tfc-orchestrator.

          ## Context — Read these files
          - `tools/tfc-orchestrator/orchestrator/worker.py` — see `_execute_claude` method (~line 530)
          - `tools/tfc-orchestrator/tests/test_worker.py` — existing worker tests

          ## Problem
          Currently `_execute_claude` uses `--output-format text` which writes Claude's final
          text response to the log file all at once. The dashboard log viewer shows nothing
          until the story finishes — then shows the final summary. Users want to see live
          progress: tool calls, file reads/edits, thinking, etc.

          ## Solution: Use `--output-format stream-json` and parse in real-time

          ### 1. Change the command
          In `_execute_claude`, change:
          - `'--output-format', 'text'` → `'--output-format', 'stream-json'`
          - Don't write stdout directly to log file. Instead, pipe stdout to PIPE and
            parse the stream-json in a reader thread.

          ### 2. Create a stream parser

          Add a function that reads stream-json from a pipe and writes human-readable
          progress lines to the log file:

          ```python
          def _stream_json_to_log(pipe, log_file_handle):
              """Read stream-json from Claude's stdout pipe and write readable progress to log.

              stream-json format: newline-delimited JSON objects. Key message types:
              - {"type":"assistant","message":{"content":[{"type":"text","text":"..."}]}}
              - {"type":"assistant","message":{"content":[{"type":"tool_use","name":"Read","input":{...}}]}}
              - {"type":"result","subtype":"success","result":"final text",...}

              We extract and write:
              - Text output lines as-is
              - Tool calls as: [tool] ToolName: brief description
              - Results as: [result] success/error
              """
              import json
              for raw_line in pipe:
                  raw_line = raw_line.strip()
                  if not raw_line:
                      continue
                  try:
                      event = json.loads(raw_line)
                  except json.JSONDecodeError:
                      log_file_handle.write(raw_line + '\n')
                      log_file_handle.flush()
                      continue

                  etype = event.get('type', '')

                  if etype == 'assistant':
                      msg = event.get('message', {})
                      for block in msg.get('content', []):
                          btype = block.get('type', '')
                          if btype == 'text':
                              text = block.get('text', '')
                              if text.strip():
                                  log_file_handle.write(text)
                                  if not text.endswith('\n'):
                                      log_file_handle.write('\n')
                                  log_file_handle.flush()
                          elif btype == 'tool_use':
                              name = block.get('name', '?')
                              inp = block.get('input', {})
                              # Brief description of the tool call
                              if name == 'Read':
                                  desc = inp.get('file_path', '')
                              elif name == 'Write':
                                  desc = inp.get('file_path', '')
                              elif name == 'Edit':
                                  desc = inp.get('file_path', '')
                              elif name == 'Bash':
                                  desc = inp.get('command', '')[:80]
                              elif name in ('Glob', 'Grep'):
                                  desc = inp.get('pattern', '')
                              else:
                                  desc = str(inp)[:80]
                              log_file_handle.write(f'[{name}] {desc}\n')
                              log_file_handle.flush()

                  elif etype == 'result':
                      subtype = event.get('subtype', '')
                      cost = event.get('cost_usd', 0)
                      duration = event.get('duration_ms', 0)
                      turns = event.get('num_turns', 0)
                      log_file_handle.write(
                          f'\n--- Result: {subtype} | {turns} turns | '
                          f'${cost:.2f} | {duration/1000:.0f}s ---\n'
                      )
                      # Also write the final result text
                      result_text = event.get('result', '')
                      if result_text:
                          log_file_handle.write(result_text)
                          if not result_text.endswith('\n'):
                              log_file_handle.write('\n')
                      log_file_handle.flush()
          ```

          IMPORTANT: The actual stream-json format may differ from the above. Before writing
          the parser, test the format by running this command from a shell (NOT inside Claude):
          ```bash
          unset CLAUDECODE
          echo "say hello" | claude -p --output-format stream-json --max-turns 1 2>/dev/null | head -20
          ```
          Read the output and adapt the parser to match the actual JSON structure.
          If you cannot run this command (e.g., inside a nested Claude session), write the
          parser defensively: log any unrecognized event types as `[unknown: {type}]` so
          we can see what's coming through and fix it later.

          ### 3. Update `_execute_claude`

          ```python
          def _execute_claude(self, story, plan, cwd):
              cmd = [
                  'claude', '-p', story.prompt,
                  '--model', plan.model,
                  '--allowedTools', plan.allowed_tools,
                  '--max-turns', str(plan.max_turns),
                  '--output-format', 'stream-json',
                  '--dangerously-skip-permissions',
              ]

              log_base = self._log_dir() / f'story_{story.id}'
              stdout_path = f'{log_base}.stdout.log'
              stderr_path = f'{log_base}.stderr.log'

              proc = None
              stdout_log = open(stdout_path, 'w')
              stderr_log = open(stderr_path, 'w')
              try:
                  proc = subprocess.Popen(
                      cmd, cwd=cwd,
                      stdin=subprocess.DEVNULL,
                      stdout=subprocess.PIPE,  # Pipe instead of file
                      stderr=stderr_log,
                      text=True, start_new_session=True,
                  )
                  # Parse stream in a thread so we don't block
                  import threading
                  reader = threading.Thread(
                      target=_stream_json_to_log,
                      args=(proc.stdout, stdout_log),
                      daemon=True,
                  )
                  reader.start()
                  proc.wait(timeout=1800)
                  reader.join(timeout=5)

                  stderr = Path(stderr_path).read_text()
                  return proc.returncode, stderr if proc.returncode != 0 else ''
              except subprocess.TimeoutExpired:
                  _kill_process_tree(proc)
                  return 124, 'Timeout after 1800s'
              except KeyboardInterrupt:
                  _kill_process_tree(proc)
                  raise
              finally:
                  stdout_log.close()
                  stderr_log.close()
          ```

          ### 4. Add tests

          In `tests/test_worker.py`, add tests for `_stream_json_to_log`:
          - `test_stream_json_text_output` — text blocks written as-is
          - `test_stream_json_tool_calls` — tool uses formatted as `[ToolName] desc`

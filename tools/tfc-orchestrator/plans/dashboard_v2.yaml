          ```python
          'plan': {
              'name': plan.name,
              'model': plan.model,
              'max_parallel': plan.workers.max_parallel if plan.workers else 1,
              'total_stories': sum(len(p.stories) for p in plan.phases),
              'execution_mode': plan.execution_mode or 'sequential',

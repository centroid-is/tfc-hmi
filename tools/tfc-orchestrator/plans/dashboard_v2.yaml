          ```

          ## Bug 6: Stale "running" detection

          Stories can get stuck as "running" if the orchestrator crashes. In `derive_node_statuses`,
          when a story has status "running" in the state file, check the log file mtime.
          If mtime > 120s ago, mark it as "interrupted" instead of "running".
          Add "interrupted" as a valid status (treat it like "failed" for DAG cascade purposes,
          but display differently in the UI — gray with a warning icon).

          ## Feature: Multi-plan support

          ### Plan discovery function
          ```python
          def discover_plans(plans_dir: Path) -> dict[str, Plan]:
              """Scan directory for *.yaml plan files, return {plan_name: Plan}."""
              plans = {}
              for f in sorted(plans_dir.glob('*.yaml')):
                  try:
                      plan = Plan.from_yaml(str(f))
                      plans[plan.name] = plan
                  except Exception:
                      pass
              return plans
          ```


name: multi-repo
project_dir: /Users/jonb/Projects/tfc-hmi
model: opus
max_turns: 200
allowed_tools: "Bash,Read,Edit,Write,Glob,Grep,Agent"

execution_mode: dag

workers:
  max_parallel: 3
  worktree_isolation: true

retry:
  max_attempts: 2
  circuit_breaker: true

review:
  enabled: true
  max_iterations: 2
  reviewers:
    - role: python_architect
      focus: "clean abstractions, backwards compatibility, protocol correctness, threading safety"
    - role: test_engineer
      focus: "test coverage, edge cases, reconnection scenarios, async/sync boundary"

# ─────────────────────────────────────────────────────────────────────────
# Acceptance criteria for ALL stories:
#   1. `python -m pytest tests/ -x -q` passes
#   2. Existing mqtt_web.yaml plan works identically (dry-run produces same DAG + prompts)
#   3. Existing dashboard command still works for local-only usage
# ─────────────────────────────────────────────────────────────────────────

phases:
  # ── Phase 1: Make repo-specific bits configurable (pure refactor) ────
  - name: "Configurable defaults (Stories 1-2)"
    validate:
      - "cd tools/tfc-orchestrator && python -m pytest tests/ -x -q"
    stories:
      - id: 1
        name: "Parameterize hardcoded repo references"
        prompt: |
          ## Goal
          Make the orchestrator usable with any repo by parameterizing the few
          hardcoded tfc-hmi references. CRITICAL: this is a REFACTOR — existing
          plans must work identically with ZERO yaml changes.

          ## TDD: Write tests first, then implement.

          ## What to change

          ### models.py — `_default_prompt()`
          - Replace the body with a generic fallback that just says:
            "Implement Story {id}: {name}. Follow all acceptance criteria."
          - Remove references to ralph-plan.md, packages/tfc_dart, dart commands.
          - The existing mqtt_web.yaml stories all have explicit `prompt:` or
            `prompt_file:` so this fallback never fires for them. Verify this.

          ### models.py — Plan dataclass
          - Add `commit_scope: str = ''`. Parse from YAML `commit_scope:`.
          - Add `stage_patterns: list[str] = field(default_factory=list)`.
            Parse from YAML `stage_patterns:`.

          ### executor.py — `commit_story()`
          - Use `plan.commit_scope` in commit message: `feat({scope}): ...` if set,
            else `feat: ...` (no scope).
          - Use `plan.stage_patterns` for git add. If empty, fall back to `git add -A`.
          - The function signature needs `plan` parameter. Update all callers.

          ### prompts.py
          - Line 157: replace `feat(mqtt):` with a variable `{commit_prefix}` that
            uses plan.commit_scope if available.

          ### verify.py — `run_golden_tests()`
          - Add `golden_test_cmd` param. If provided, run that. If not, keep current
            `flutter test test/painter/ test/page_creator/` as default.
          - Add `golden_test_cmd: str = ''` to VerificationConfig, parse from YAML
            `verification.golden_test_cmd:`.

          ### verify.py — `run_marionette_check()`
          - Add `marionette_cmd` param. If provided, run that. If not, keep current
            `flutter run -d linux` as default.
          - Add `marionette_cmd: str = ''` to VerificationConfig, parse from YAML
            `verification.marionette_cmd:`.

          ## Backwards compatibility proof
          - Write a test that loads mqtt_web.yaml and verifies:
            - commit_scope defaults to '' (so commit msg becomes `feat: Story N — ...`)
            - stage_patterns defaults to [] (so `git add -A` is used)
            - golden_test_cmd defaults to '' (so existing flutter command runs)
            - _default_prompt is never called (all stories have explicit prompts)

          ## Acceptance
          - All existing tests pass
          - New tests verify the parameterization
          - mqtt_web.yaml loads and dry-runs identically

      - id: 2
        name: "Relative/expandable project_dir + plan-level setup"
        depends_on: [1]
        prompt: |
          ## Goal
          Allow project_dir to use `~` and relative paths so plan YAMLs are portable.
          Add plan-level setup/teardown hooks for repo-specific env prep.

          ## TDD: Write tests first, then implement.

          ### models.py — Plan.from_yaml()
          - After reading project_dir: expanduser() → resolve relative to YAML parent → realpath()
          - Existing absolute paths pass through unchanged (backwards compatible).

          ### models.py — Plan dataclass
          - Add `setup: list[str]` and `teardown: list[str]`, default empty.
          - Parse from top-level YAML keys.

          ### worker.py — _run_story_sync()
          - Run plan.setup commands in worktree cwd before _execute_claude().
          - Plan-level setup runs BEFORE phase-level setup.
          - Run plan.teardown after story completes (pass or fail).

          ## Tests
          - `~/foo` expands to absolute path
          - `../my-repo` resolves relative to YAML directory
          - Absolute paths unchanged
          - setup/teardown parse from YAML and default to empty
          - mqtt_web.yaml has no setup/teardown → empty lists, no behavioral change

  # ── Phase 2: Hub WebSocket server + client ───────────────────────────
  - name: "Hub protocol (Stories 3-5)"
    validate:
      - "cd tools/tfc-orchestrator && python -m pytest tests/ -x -q"
    stories:
      - id: 3
        name: "Hub WebSocket server"
        depends_on: [1]
        prompt: |
          ## Goal
          Create the central hub — a WebSocket server that orchestrator instances
          connect to. The hub is a DUMB RELAY: it stores what orchestrators push
          and serves it via the SAME REST API shape as dashboard.py.

          The hub does NOT derive statuses itself. Orchestrators push pre-computed
          statuses so the hub has no dependency on Plan objects or DAGScheduler.

          ## TDD: Write tests first, then implement.

          ## New file: orchestrator/hub.py

          ### HubServer class
          ```python
          class HubServer:
              def __init__(self):
                  # Keyed by composite ID: "{repo_basename}/{plan_name}"
                  # This prevents collision when two repos have plans with the same name.
                  self.connections: dict[str, web.WebSocketResponse] = {}
                  self.registry: dict[str, dict] = {}     # → {repo, plan_summary, dag}
                  self.states: dict[str, dict] = {}        # → {results: [...], statuses: {...}}
                  self.log_buffers: dict[str, dict] = {}   # → {story_id → {stdout: deque, stderr: deque}}
                  self._update_condition: asyncio.Condition = asyncio.Condition()
                  self._max_log_lines: int = 5000  # ring buffer per story per stream
          ```

          ### Composite key
          When an orchestrator registers with name="mqtt-web" and repo="/Users/jon/Projects/tfc-hmi",
          the composite key is "tfc-hmi/mqtt-web" (last path component of repo + plan name).
          If a second orchestrator tries to register with the SAME composite key while
          one is already connected, reject with:
          `{"type": "error", "message": "Plan 'tfc-hmi/mqtt-web' already connected"}`
          If the first is disconnected (stale entry), allow re-registration (overwrite).

          ### WebSocket protocol (JSON messages)
          Orchestrator → Hub:
          - `{"type": "register", "name": "mqtt-web", "repo": "/path/to/repo",
              "plan": {"name", "model", "max_parallel", "total_stories", "execution_mode"},
              "dag": {"nodes": [...], "edges": [...]},
              "state": {"results": [...], "statuses": {"1": "passed", ...}}}`
            NOTE: register includes full current state snapshot so reconnects restore everything.
          - `{"type": "state_update", "name": "mqtt-web",
              "results": [<full results list>],
              "statuses": {"1": "passed", "2": "running", ...}}`
            NOTE: statuses are PRE-COMPUTED by the orchestrator using derive_node_statuses().
            The hub just stores and serves them. No Plan or DAGScheduler needed on the hub.
          - `{"type": "log_chunk", "name": "mqtt-web", "story_id": 1,
              "stream": "stdout", "data": "some log text"}`
          - `{"type": "heartbeat", "name": "mqtt-web", "timestamp": "2026-03-17T..."}`

          Hub → Orchestrator:
          - `{"type": "ack"}` (after successful register)
          - `{"type": "error", "message": "..."}` (on duplicate key, bad message, etc.)

          ### REST API (matches dashboard.py response shapes)
          - `GET /api/plans` → `[{"name", "status", "passed", "failed", "running", "total", "connected", "last_heartbeat", "repo", "composite_key"}]`
            Status/counts derived from stored statuses dict (count values, no DAGScheduler needed).
            `connected: bool` — true if WebSocket is active.
          - `GET /api/{composite_key}/state` → `{"plan": {...}, "dag": {...}, "state": {"results": [...]}, "statuses": {...}}`
            Served directly from stored data. No computation needed.
          - `GET /api/{composite_key}/events` → SSE stream.
            Uses `asyncio.Condition` for fan-out: state_update handler calls
            `self._update_condition.notify_all()`. Each SSE handler waits on the
            condition in a loop, checks if its plan's state changed, and pushes.
          - `GET /api/{composite_key}/logs/{story_id}/{stream}` → plain text from deque
          - `GET /api/{composite_key}/logs/{story_id}/{stream}/tail` → SSE of new chunks
            Uses a per-plan asyncio.Condition (or the global one) to wake on new log_chunks.
          - Serve Svelte dist at `/` if present.

          ### Log buffer ring
          Each story/stream gets a `collections.deque(maxlen=5000)`.
          log_chunk appends lines. `/logs/` endpoint joins and returns.
          This bounds memory regardless of run duration.

          ### Disconnect handling
          On WS close: remove from self.connections. Keep everything else (registry,
          states, log_buffers). REST API continues serving last-known state with
          connected=false.

          ### Entry point
          ```python
          def main():
              parser = argparse.ArgumentParser(description='tfc-orchestrator hub')
              parser.add_argument('--host', default='0.0.0.0')
              parser.add_argument('--port', type=int, default=9000)
              args = parser.parse_args()
              hub = HubServer()
              app = hub.create_app()
              web.run_app(app, host=args.host, port=args.port)
          ```

          ### Tests (tests/test_hub.py)
          Use aiohttp test client:
          - WS connect + register → registry populated, ack returned
          - state_update with pre-computed statuses → /api/plans shows correct counts
          - state_update → /api/{key}/state returns stored statuses as-is
          - log_chunk → /api/{key}/logs returns accumulated text
          - log buffer respects max_log_lines (deque maxlen)
          - WS disconnect → connected=false, state preserved
          - SSE /events emits when state_update arrives (test with asyncio.wait_for)
          - Duplicate composite key while connected → error response
          - Duplicate composite key while disconnected → re-registration allowed
          - heartbeat updates last_heartbeat timestamp

      - id: 4
        name: "Orchestrator WebSocket client"
        depends_on: [3]
        prompt: |
          ## Goal
          Add a fire-and-forget WebSocket client to the orchestrator. When `hub_url`
          is set in the plan YAML, the orchestrator connects and pushes state.
          When not set, behavior is unchanged (standalone mode).

          ## TDD: Write tests first, then implement.

          ## CRITICAL: Threading/async boundary
          worker.py uses ThreadPoolExecutor. _run_story_sync() is synchronous.
          But HubClient needs async WebSocket I/O. The design must bridge this:

          - HubClient runs its own asyncio event loop in a DAEMON THREAD.
          - Public methods (send_state_update, send_log_chunk) use a thread-safe
            `queue.Queue` (not asyncio.Queue) to enqueue messages from any thread.
          - The daemon thread's event loop drains the queue and sends via WebSocket.
          - This means _run_story_sync() can call hub_client.send_state_update()
            directly — it's a normal sync call that puts a dict on a thread-safe queue.

          ## New file: orchestrator/hub_client.py

          ```python
          import queue
          import threading
          import asyncio
          import json
          import logging
          from typing import TYPE_CHECKING

          if TYPE_CHECKING:
              from .state import OrchestratorState

          import aiohttp

          logger = logging.getLogger(__name__)


          class HubClient:
              """Non-blocking WebSocket client that pushes state to the hub.

              Runs its own event loop in a daemon thread. All public methods are
              thread-safe and non-blocking. Safe to call from sync code.
              """

              def __init__(self, hub_url: str, plan_name: str, repo: str):
                  self.hub_url = hub_url          # e.g. "ws://localhost:9000/ws"
                  self.plan_name = plan_name
                  self.repo = repo
                  self._state_ref: OrchestratorState | None = None  # for reconnect snapshots
                  self._plan_summary: dict = {}
                  self._dag_info: dict = {}
                  self._msg_queue: queue.Queue = queue.Queue(maxsize=1000)
                  self._stop_event = threading.Event()
                  self._thread: threading.Thread | None = None
                  self._connected = False
                  self._reconnect_interval = 5

              def start(self, plan_summary: dict, dag_info: dict, state: 'OrchestratorState'):
                  """Start the background sender thread. Call from main thread."""
                  self._plan_summary = plan_summary
                  self._dag_info = dag_info
                  self._state_ref = state  # kept for reconnect state snapshots
                  self._thread = threading.Thread(target=self._run_loop, daemon=True)
                  self._thread.start()

              def stop(self):
                  """Signal the background thread to stop."""
                  self._stop_event.set()
                  if self._thread:
                      self._thread.join(timeout=5)

              def send_state_update(self, results: list[dict], statuses: dict[int, str]):
                  """Enqueue state update. Thread-safe. Non-blocking. Drops if queue full."""
                  msg = {
                      "type": "state_update",
                      "name": self.plan_name,
                      "results": results,
                      "statuses": {str(k): v for k, v in statuses.items()},
                  }
                  try:
                      self._msg_queue.put_nowait(msg)
                  except queue.Full:
                      pass  # drop — next update will have current state anyway

              def send_log_chunk(self, story_id: int, stream: str, data: str):
                  """Enqueue log chunk. Thread-safe. Non-blocking."""
                  msg = {
                      "type": "log_chunk",
                      "name": self.plan_name,
                      "story_id": story_id,
                      "stream": stream,
                      "data": data,
                  }
                  try:
                      self._msg_queue.put_nowait(msg)
                  except queue.Full:
                      pass

              def _run_loop(self):
                  """Background thread: runs asyncio event loop."""
                  loop = asyncio.new_event_loop()
                  asyncio.set_event_loop(loop)
                  try:
                      loop.run_until_complete(self._async_loop())
                  finally:
                      loop.close()

              async def _async_loop(self):
                  """Connect, send register, drain queue, reconnect on failure."""
                  ...  # Implementation: connect WS, send register (with state snapshot),
                       # loop: drain _msg_queue with timeout, send each message,
                       # on WS error: reconnect after _reconnect_interval,
                       # re-send register with fresh state snapshot from _state_ref,
                       # exit when _stop_event.is_set()

              def _build_register_msg(self) -> dict:
                  """Build register message with current state snapshot."""
                  state_snapshot = {"results": [], "statuses": {}}
                  if self._state_ref:
                      # Read current results from OrchestratorState (thread-safe, it uses a lock)
                      state_snapshot = {
                          "results": [... serialize self._state_ref.results ...],
                          "statuses": {... derive from results ...},
                      }
                  return {
                      "type": "register",
                      "name": self.plan_name,
                      "repo": self.repo,
                      "plan": self._plan_summary,
                      "dag": self._dag_info,
                      "state": state_snapshot,
                  }
          ```

          ### Deriving statuses for push
          The orchestrator already has derive_node_statuses() in dashboard.py.
          But that function needs a Plan and log_dir. Instead, add a simpler helper:

          In state.py or a new helper, add:
          ```python
          def derive_statuses_from_state(state: OrchestratorState, plan: Plan) -> dict[int, str]:
              """Derive story statuses from OrchestratorState for hub push."""
          ```
          This reuses the DAGScheduler logic locally (orchestrator HAS the Plan object)
          and returns {story_id: status_string}. The hub just stores the result.

          ### models.py
          - Add `hub_url: str = ''` to Plan. Parse from YAML `hub_url:`.
          - Empty string = standalone mode (no hub connection).

          ### worker.py integration
          - In WorkerPool.__init__(): if plan.hub_url is set, create HubClient(hub_url, plan.name, plan.project_dir).
          - In _run_plan_dag(): call hub_client.start(plan_summary, dag_info, state) before dispatch loop.
            hub_client.stop() after.
          - In _run_story_sync(): after each state.mark_running/mark_complete/mark_failed + state.save():
            also call hub_client.send_state_update(results, statuses).
            Use the new derive_statuses_from_state() helper to compute statuses.
          - In _stream_json_to_log(): also call hub_client.send_log_chunk().

          ### Backwards compatibility
          - mqtt_web.yaml has no hub_url → HubClient is never created → identical behavior.

          ### Tests (tests/test_hub_client.py)
          - send_state_update enqueues dict on queue (inspect _msg_queue)
          - send_state_update on full queue doesn't raise (drops silently)
          - send_log_chunk enqueues correctly
          - start() creates and starts daemon thread
          - stop() signals thread to exit within timeout
          - _build_register_msg includes state snapshot from OrchestratorState
          - hub_url='' means no HubClient created (test via WorkerPool init)
          - Integration: start client, connect to test hub, verify register message received

      - id: 5

      - id: 9
        name: "Plan creator Claude agent backend"
        depends_on: [3, 8]
        prompt: |
          ## Goal
          Add a Claude agent to the hub that helps users create plan YAMLs
          through conversation. The agent can explore target repos to understand
          their structure and generate well-tailored plans.

          ## TDD: Write tests first, then implement.

          ## New file: orchestrator/plan_agent.py

          ### PlanAgentSession class
          Manages a single Claude subprocess for interactive plan creation.

          ```python
          class PlanAgentSession:
              """Interactive Claude session for plan creation."""

              def __init__(self, session_id: str, repo_path: str):
                  self.session_id = session_id
                  self.repo_path = repo_path  # target repo to explore
                  self._proc: subprocess.Popen | None = None
                  self._alive = False

              async def start(self):
                  """Spawn Claude subprocess with plan-creation system prompt."""
                  ...

              async def send_message(self, user_msg: str) -> AsyncIterator[str]:
                  """Send user message, yield streamed response chunks."""
                  ...

              async def stop(self):
                  """Kill the Claude subprocess."""
                  ...
          ```

          ### Claude invocation
          Use `claude` CLI in conversation mode (NOT `-p` one-shot). The agent
          needs to maintain conversation context across multiple user messages.

          Approach: use `claude` with `--output-format stream-json` and pipe
          stdin/stdout. Send user messages as JSON to stdin, read responses
          from stdout.

          Actually, simpler approach: use the Claude API directly via the
          `anthropic` Python SDK (if available) or spawn sequential `claude -p`
          calls with conversation history appended to the prompt. The sequential
          approach is simpler and doesn't require the SDK as a dependency.

          **Recommended: sequential `claude -p` with accumulated context.**
          Each user message triggers a new `claude -p` call with the full
          conversation history in the prompt. This is stateless and robust.

          ```python
          async def send_message(self, user_msg: str) -> str:
              self._history.append({"role": "user", "content": user_msg})
              prompt = self._build_prompt()
              result = await asyncio.to_thread(
                  subprocess.run,
                  ["claude", "-p", prompt,
                   "--model", "sonnet",
                   "--allowedTools", "Read,Glob,Grep,Bash",
                   "--output-format", "text",
                   "--dangerously-skip-permissions"],
                  cwd=self.repo_path,
                  capture_output=True, text=True, timeout=120,
              )
              response = result.stdout.strip()
              self._history.append({"role": "assistant", "content": response})
              return response
          ```

          ### System prompt (embedded in plan_agent.py)
          The system prompt must include:
          1. The plan YAML schema with all fields documented
          2. A complete example plan (use mqtt_web.yaml as template, anonymized)
          3. Instructions to:
             - Ask clarifying questions before generating (what language? what tests? how many phases?)
             - Explore the repo structure first (read key files, find test commands, understand build system)
             - Generate the YAML in a ```yaml code block
             - Follow TDD conventions in story prompts
             - Set appropriate validate commands based on the repo's toolchain

          ### Hub integration (hub.py)
          Add to HubServer:
          ```python
          self.plan_sessions: dict[str, PlanAgentSession] = {}  # session_id → session
          ```

          New WebSocket endpoint: `/ws/plan-creator`
          Protocol:
          - Client → Hub: `{"type": "start_session", "repo_url": "https://github.com/foo/bar.git"}`
            OR: `{"type": "start_session", "repo_path": "/local/path/to/repo"}`
            If `repo_url` is provided, hub clones it first (see Workspace Manager below).
            If `repo_path` is provided, use it directly (existing behavior).
            Returns `{"type": "session_started", "session_id": "...", "repo_path": "/resolved/path"}`
          - Client → Hub: `{"type": "chat", "session_id": "...", "message": "I want to add auth"}`
            Hub calls session.send_message(), returns `{"type": "response", "content": "..."}`
            (For v1, response is sent as a single message after Claude finishes.
             Streaming can be added later.)
          - Client → Hub: `{"type": "save_plan", "session_id": "...", "yaml_content": "...", "plan_name": "auth"}`
            Hub writes YAML to `{repo_path}/.orchestrator/plans/{plan_name}.yaml`
            Returns `{"type": "plan_saved", "path": "..."}`
          - Client → Hub: `{"type": "end_session", "session_id": "..."}`
            Hub stops the session, cleans up.

          ### Workspace Manager (in plan_agent.py or new orchestrator/workspace.py)
          Manages cloned repos in a workspace directory.

          ```python
          class WorkspaceManager:
              """Manages git clones for plan creation sessions."""

              def __init__(self, workspace_dir: str = "~/.tfc-orchestrator/repos"):
                  self.workspace_dir = Path(workspace_dir).expanduser()
                  self.workspace_dir.mkdir(parents=True, exist_ok=True)

              def resolve_repo(self, repo_url: str | None, repo_path: str | None) -> str:
                  """Return a local path to the repo. Clones if repo_url given."""
                  if repo_path:
                      return repo_path
                  if repo_url:
                      return self._clone_or_reuse(repo_url)
                  raise ValueError("Either repo_url or repo_path required")

              def _clone_or_reuse(self, url: str) -> str:
                  """Clone repo or reuse existing clone. Returns local path."""
                  # Derive directory name from URL:
                  # "https://github.com/foo/bar.git" → "github.com_foo_bar"
                  repo_name = self._url_to_dirname(url)
                  clone_dir = self.workspace_dir / repo_name

                  if clone_dir.exists() and (clone_dir / ".git").exists():
                      # Existing clone — pull latest
                      subprocess.run(
                          ["git", "pull", "--ff-only"],
                          cwd=str(clone_dir), capture_output=True, timeout=60,
                      )
                      return str(clone_dir)

                  # Fresh shallow clone (fast, saves disk)
                  subprocess.run(
                      ["git", "clone", "--depth", "1", url, str(clone_dir)],
                      capture_output=True, text=True, timeout=120, check=True,
                  )
                  return str(clone_dir)

              def _url_to_dirname(self, url: str) -> str:
                  """Convert git URL to a safe directory name."""
                  # Strip protocol, .git suffix, replace / with _
                  ...

              def cleanup_old(self, max_age_days: int = 30):
                  """Remove clones not accessed in N days."""
                  ...
          ```

          Key design:
          - Workspace dir: `~/.tfc-orchestrator/repos/` (configurable via hub --workspace-dir)
          - Shallow clone (`--depth 1`) for speed — plan creator only needs current state
          - Reuse existing clones (pull latest on reuse)
          - Directory name derived from URL (deterministic, so same URL = same clone)
          - Uses whatever git credentials are configured on the host (SSH keys, credential helpers)
          - cleanup_old() removes stale clones (called on hub startup)

          ### Hub integration
          Add `--workspace-dir` flag to hub CLI (default: ~/.tfc-orchestrator/repos)
          HubServer creates WorkspaceManager in __init__().
          start_session handler calls workspace.resolve_repo() before creating PlanAgentSession.

          ### Session cleanup
          - Sessions auto-expire after 30 minutes of inactivity.
          - Max 3 concurrent sessions (prevent resource exhaustion).
          - On hub shutdown, all sessions are stopped.
          - Cloned repos are NOT deleted with sessions (they persist for reuse).
          - Stale clones cleaned on hub startup (default: 30 days).

          ### Tests (tests/test_plan_agent.py)
          - PlanAgentSession._build_prompt() includes system prompt + history
          - send_message appends to history correctly
          - Session start/stop lifecycle
          - Hub WebSocket: start_session with repo_path creates session
          - Hub WebSocket: start_session with repo_url clones and creates session
          - Hub WebSocket: start_session with same repo_url reuses existing clone
          - Hub WebSocket: chat returns response
          - Hub WebSocket: save_plan writes YAML file
          - Hub WebSocket: end_session cleans up
          - WorkspaceManager._url_to_dirname produces safe, deterministic names
          - WorkspaceManager.cleanup_old removes stale dirs (mock mtime)
          - Session timeout after inactivity
          - Max concurrent sessions enforced
          - Clone failure (bad URL) returns error to client


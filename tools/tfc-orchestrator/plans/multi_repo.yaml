      - id: 7
        name: "Integration test: full hub round-trip"
        depends_on: [4, 6]
        prompt: |
          ## Goal
          End-to-end test: start hub, connect mock orchestrator via WebSocket,
          push state updates, verify REST API and SSE reflect the changes.

          ## TDD: Write the test, then fix any issues found.

          ### tests/test_hub_integration.py

          Test scenario:
          1. Start HubServer as aiohttp test app
          2. Connect WebSocket client, send register message with a mock plan
             (3 stories, simple DAG: 1→2→3) and initial state (all pending)
          3. Send state_update: story 1 running (with pre-computed statuses)
          4. Verify GET /api/plans shows status=running, running=1
          5. Send state_update: story 1 pass (with updated statuses)
          6. Verify GET /api/{composite_key}/state shows story 1 passed in statuses
          7. Send log_chunk for story 2
          8. Verify GET /api/{composite_key}/logs/2/stdout returns the chunk
          9. Disconnect WebSocket
          10. Verify GET /api/plans shows connected=false, state preserved
          11. Reconnect, send register with FULL state snapshot (story 1 passed)
          12. Verify state is restored correctly after reconnect

          Also test:
          - Two orchestrators from DIFFERENT repos connected simultaneously
          - Two orchestrators from SAME repo but different plan names
          - Duplicate composite key while first is connected → error message
          - Duplicate composite key after first disconnects → re-registration succeeds
          - SSE /events stream emits when state_update arrives
          - Log buffer ring: send > 5000 lines, verify only last 5000 returned
          - Heartbeat updates last_heartbeat timestamp

          ### Validation
          - `python -m pytest tests/test_hub_integration.py -v` passes


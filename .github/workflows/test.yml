name: Flutter Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Get dependencies
      run: flutter pub get

    - name: Run pages tests
      run: flutter test test/

  tfc-dart-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - uses: dart-lang/setup-dart@v1

    # Docker is pre-installed on Linux runners. On macOS it installs via lima;
    # on Windows it enables Linux containers.
    - name: Set up Docker
      if: runner.os != 'Linux'
      uses: docker/setup-docker-action@v3

    - name: Get dependencies
      working-directory: packages/tfc_dart
      run: dart pub get

    - name: Run tfc_dart tests
      working-directory: packages/tfc_dart
      run: dart test

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: |
          packages/tfc_dart/coverage/
          packages/tfc_dart/test-results/
        retention-days: 30

name: Flutter Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Get dependencies
      run: flutter pub get

    - name: Run pages tests
      run: flutter test test/

  tfc-dart-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
            timescaledb_external: "1"
            pg_service_name: postgresql@17
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - uses: dart-lang/setup-dart@v1

    # Docker Desktop is pre-installed on Windows runners but defaults to
    # Windows containers; switch to Linux containers for TimescaleDB.
    - name: Switch Docker to Linux containers (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        & "$env:ProgramFiles\Docker\Docker\DockerCli.exe" -SwitchLinuxEngine
        Start-Sleep -s 15
        docker info

    # macOS arm64 runners can't run Docker, so install TimescaleDB natively.
    - name: Install TimescaleDB natively (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install timescale/tap/timescaledb
        timescaledb-tune --quiet --yes
        brew services start postgresql@17
        sleep 5
        createdb testdb
        psql -d testdb -c "CREATE ROLE testuser WITH SUPERUSER LOGIN PASSWORD 'testpass';"
        psql -d testdb -c "GRANT ALL ON DATABASE testdb TO testuser;"
        psql -d testdb -c "CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;"

    - name: Get dependencies
      working-directory: packages/tfc_dart
      run: dart pub get

    - name: Run tfc_dart tests
      working-directory: packages/tfc_dart
      env:
        TIMESCALEDB_EXTERNAL: ${{ matrix.timescaledb_external }}
        PG_SERVICE_NAME: ${{ matrix.pg_service_name }}
      run: dart test

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: |
          packages/tfc_dart/coverage/
          packages/tfc_dart/test-results/
        retention-days: 30

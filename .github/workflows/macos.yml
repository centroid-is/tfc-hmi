name: macOS Build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (commit SHA, branch, tag)'
        type: string
        default: ''
  push:
    branches:
      - main
      - 'feat/centroidx-manager'
    paths:
      - 'centroid-hmi/**'
      - '.github/workflows/macos.yml'
  pull_request:
    paths:
      - 'centroid-hmi/**'
      - '.github/workflows/macos.yml'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get Flutter packages
        working-directory: centroid-hmi
        run: flutter pub get

      - name: Build macOS release
        working-directory: centroid-hmi
        run: flutter build macos --release

      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE_P12_BASE64 != ''
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "Signing identity: $IDENTITY"

      - name: Sign the .app bundle
        if: env.CODESIGN_IDENTITY != ''
        working-directory: centroid-hmi
        run: |
          APP_PATH="build/macos/Build/Products/Release/centroidx.app"
          if [ ! -d "$APP_PATH" ]; then
            # Flutter may name it differently — find it
            APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          fi
          echo "Signing: $APP_PATH"

          # Sign all nested frameworks/dylibs first, then the app
          codesign --force --options runtime --sign "$CODESIGN_IDENTITY" --timestamp \
            --deep "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Signing verified"

      - name: Set APP_PATH for unsigned builds
        if: env.CODESIGN_IDENTITY == ''
        working-directory: centroid-hmi
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create DMG
        run: |
          APP_NAME=$(basename "$APP_PATH" .app)
          DMG_NAME="centroidx_darwin_arm64.dmg"

          # Create a temporary directory for the DMG contents
          DMG_DIR=$RUNNER_TEMP/dmg-contents
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/CentroidX.app"
          ln -s /Applications "$DMG_DIR/Applications"

          # Create DMG
          hdiutil create -volname "CentroidX" -srcfolder "$DMG_DIR" \
            -ov -format UDZO "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV
          ls -lh "$DMG_NAME"

      - name: Sign the DMG
        if: env.CODESIGN_IDENTITY != ''
        run: |
          codesign --force --sign "$CODESIGN_IDENTITY" --timestamp "$DMG_NAME"
          codesign --verify --strict "$DMG_NAME"
          echo "DMG signed"

      - name: Notarize the DMG
        if: env.CODESIGN_IDENTITY != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          echo "Notarization complete"

          # Staple the notarization ticket to the DMG
          xcrun stapler staple "$DMG_NAME"
          echo "Stapled notarization ticket"

      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: centroidx_darwin_arm64.dmg
          path: ${{ env.DMG_NAME }}

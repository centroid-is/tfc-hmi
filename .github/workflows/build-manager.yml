name: Build centroidx-manager

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feat/centroidx-manager'
    paths:
      - 'tools/centroidx-manager/**'
      - '.github/workflows/build-manager.yml'
  pull_request:
    paths:
      - 'tools/centroidx-manager/**'
      - '.github/workflows/build-manager.yml'
  workflow_call:
    inputs:
      ref:
        type: string
        default: ''

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: centroidx-manager_windows_amd64.exe
            cgo: '0'
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: centroidx-manager_linux_amd64
            cgo: '1'
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: centroidx-manager_darwin_arm64
            cgo: '1'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Linux build dependencies (Gio)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libvulkan-dev

      - name: Build manager binary
        working-directory: tools/centroidx-manager
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go build -o ${{ matrix.artifact_name }} .

      - name: Verify binary
        working-directory: tools/centroidx-manager
        shell: bash
        run: |
          echo "Built: ${{ matrix.artifact_name }}"
          ls -la ${{ matrix.artifact_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: tools/centroidx-manager/${{ matrix.artifact_name }}

  integration-test:
    needs: [build]
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            cgo: '0'
          - os: ubuntu-latest
            goos: linux
            cgo: '1'
          - os: macos-latest
            goos: darwin
            cgo: '1'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Linux build dependencies (Gio)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libwayland-dev libx11-dev libx11-xcb-dev libxkbcommon-x11-dev libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libvulkan-dev

      - name: Run integration tests
        working-directory: tools/centroidx-manager
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go test -tags integration -v -timeout 300s ./internal/update/ -run TestIntegration

      - name: Run platform integration tests
        working-directory: tools/centroidx-manager
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go test -tags integration -v -timeout 120s ./internal/platform/ -run TestIntegration

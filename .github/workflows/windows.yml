name: Windows MSIX Build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (commit SHA, branch, tag)'
        type: string
        default: ''
      release:
        description: 'Create a GitHub release with the MSIX'
        type: boolean
        default: false
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get Flutter packages
        working-directory: centroid-hmi
        run: flutter pub get

      - name: Build Windows
        working-directory: centroid-hmi
        run: flutter build windows --release

      - name: Write certificate PFX from secret
        shell: powershell
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.MSIX_CERT_PFX_BASE64 }}")
          [IO.File]::WriteAllBytes("${{ github.workspace }}/centroid-hmi/centroidx-sideload.pfx", $bytes)

      - name: Build MSIX (sideload, signed)
        working-directory: centroid-hmi
        shell: powershell
        run: echo "n" | dart run msix:create --certificate-password "${{ secrets.MSIX_CERT_PASSWORD }}"

      - name: Verify MSIX signature and timestamp
        working-directory: centroid-hmi
        shell: powershell
        run: |
          $msix = Get-ChildItem -Recurse -Filter *.msix | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $msix) { throw "No .msix file found after build" }
          Write-Host "Verifying: $($msix.FullName)"
          # Find signtool in Windows SDK
          $sdkPaths = @(
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe",
            "${env:ProgramFiles}\Windows Kits\10\bin\*\x64\signtool.exe"
          )
          $signtool = Get-ChildItem -Path $sdkPaths -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { Write-Host "WARNING: signtool not found, skipping signature verification"; exit 0 }
          $output = & $signtool.FullName verify /pa /v $msix.FullName 2>&1 | Out-String
          Write-Host $output
          if ($output -notmatch "The signature is timestamped") {
            throw "MSIX signature is NOT timestamped. Check signtool_options in pubspec.yaml."
          }
          Write-Host "PASS: Signature is timestamped"

      - name: Locate MSIX
        working-directory: centroid-hmi
        id: locate
        shell: powershell
        run: |
          $msix = Get-ChildItem -Recurse -Filter *.msix | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $msix) { throw "No .msix file found" }
          "msix=$($msix.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: centroid-hmi.msix
          path: ${{ steps.locate.outputs.msix }}

name: Windows MSIX Build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout (commit SHA, branch, tag)'
        type: string
        default: ''
      release:
        description: 'Create a GitHub release with the MSIX'
        type: boolean
        default: false
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get Flutter packages
        working-directory: centroid-hmi
        run: flutter pub get

      - name: Build Windows
        working-directory: centroid-hmi
        run: flutter build windows --release

      - name: Create MSIX for Store
        working-directory: centroid-hmi
        shell: powershell
        run: dart run msix:create --store

      - name: Locate MSIX
        working-directory: centroid-hmi
        id: locate
        shell: powershell
        run: |
          $msix = Get-ChildItem -Recurse -Filter *.msix | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $msix) { throw "No .msix file found" }
          "msix=$($msix.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: centroid-hmi.msix
          path: ${{ steps.locate.outputs.msix }}
